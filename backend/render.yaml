# Render.com Blueprint - Deploy backend
# Use: render.com > New > Blueprint > Connect this repo
services:
  - type: web
    name: agritech-api
    runtime: python
    region: singapore  # closest to India
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agritech-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: DEBUG
        value: "false"
    healthCheckPath: /health

databases:
  - name: agritech-db
    plan: free
    databaseName: agritech
    postgresMajorVersion: 16
